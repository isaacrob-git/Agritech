<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Agricultor | CosechaDirecta</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 p-6">

<h1 class="text-2xl font-bold mb-6">Dashboard Agricultor</h1>

<!-- FORM CREAR PRODUCTO -->
<div class="bg-white p-4 rounded-xl shadow mb-6">
    <h2 class="font-bold mb-4">Crear producto</h2>

    <form id="productForm" class="grid gap-3">
        <input id="nombre" placeholder="Nombre" class="border p-2 rounded" required>
        <input id="cantidad" type="number" placeholder="Cantidad (kg)" class="border p-2 rounded" required>
        <input id="precioKg" type="number" placeholder="Precio por Kg" class="border p-2 rounded" required>
        <input id="ubicacion" placeholder="Ubicación" class="border p-2 rounded" required>

        <button class="bg-green-600 text-white p-2 rounded">
            Guardar producto
        </button>
    </form>
</div>

<!-- MIS PRODUCTOS -->
<div class="bg-white p-4 rounded-xl shadow mb-6">
    <h2 class="font-bold mb-4">Mis productos</h2>

    <table class="w-full text-left">
        <thead>
            <tr class="border-b">
                <th>Nombre</th>
                <th>Cantidad</th>
                <th>Precio/kg</th>
                <th>Ubicación</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<!-- PEDIDOS -->
<div class="bg-white p-4 rounded-xl shadow mb-6">
    <h2 class="font-bold mb-4">Pedidos recibidos</h2>
    <div id="orders"></div>
</div>

<!-- MIS VIAJES -->
<div class="bg-white p-4 rounded-xl shadow mb-6">
    <div class="flex justify-between items-center mb-4">
        <h2 class="font-bold">Mis viajes</h2>
        <button onclick="mostrarCrearViaje()"
            class="bg-blue-600 text-white px-3 py-1 rounded text-sm font-bold">
            + Publicar viaje
        </button>
    </div>
    <div id="viajesContainer"></div>
</div>

<!-- MIS TOKENS -->
<div class="bg-white p-4 rounded-xl shadow mb-6">
    <h2 class="font-bold mb-4">Mis tokens</h2>
    <div id="tokensContainer"></div>
</div>

<!-- CONTRATOS -->
<div class="bg-white p-4 rounded-xl shadow mb-6">
    <h2 class="font-bold mb-4">Contratos</h2>
    <div id="contractsContainer"></div>
</div>

<!-- MIS FINANCIAMIENTOS -->
<div class="bg-white p-4 rounded-xl shadow">
    <h2 class="font-bold mb-4">Mis financiamientos</h2>
    <div id="financingContainer"></div>
</div>

<!-- MODAL FINANCIAMIENTO -->
<div id="financingModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded-xl w-full max-w-md">
        <h3 class="font-bold text-lg mb-2">Solicitar financiamiento</h3>
        <p class="text-gray-500 text-sm mb-4">Token: <span id="finTokenCodigo" class="font-bold text-black"></span></p>

        <div class="space-y-3">
            <div>
                <label class="text-sm font-semibold">Valor estimado del activo</label>
                <p id="finValorEstimado" class="text-xl font-bold text-green-700"></p>
            </div>
            <div>
                <label class="text-sm font-semibold">Monto a solicitar ($)</label>
                <input type="number" id="finMonto" min="1" class="w-full border p-2 rounded">
            </div>
            <div>
                <label class="text-sm font-semibold">Plazo (días)</label>
                <input type="number" id="finPlazo" min="1" value="90" class="w-full border p-2 rounded">
            </div>
        </div>

        <div class="flex justify-end gap-2 mt-6">
            <button onclick="cerrarFinancing()" class="bg-gray-300 px-4 py-2 rounded">Cancelar</button>
            <button onclick="confirmarFinancing()" class="bg-yellow-600 text-white px-4 py-2 rounded font-bold">Solicitar</button>
        </div>
    </div>
</div>

<!-- MODAL CREAR VIAJE -->
<div id="crearViajeModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded-xl w-full max-w-lg">
        <h3 class="font-bold text-lg mb-4">Publicar nuevo viaje</h3>

        <div id="crearViajePedidos" class="mb-4 space-y-2"></div>

        <div class="space-y-3">
            <div>
                <label class="text-sm font-semibold">Origen</label>
                <input type="text" id="viajeOrigen" class="w-full border p-2 rounded" placeholder="Ej: Mérida">
            </div>
            <div>
                <label class="text-sm font-semibold">Destino</label>
                <input type="text" id="viajeDestino" class="w-full border p-2 rounded" placeholder="Ej: Caracas">
            </div>
            <div>
                <label class="text-sm font-semibold">Pago ofrecido al transportista ($)</label>
                <input type="number" id="viajePago" min="1" class="w-full border p-2 rounded">
            </div>
            <p id="viajeCargaTotal" class="text-sm text-gray-500 font-bold"></p>
        </div>

        <div class="flex justify-end gap-2 mt-6">
            <button onclick="cerrarCrearViaje()" class="bg-gray-300 px-4 py-2 rounded">Cancelar</button>
            <button onclick="confirmarCrearViaje()" class="bg-blue-600 text-white px-4 py-2 rounded font-bold">Publicar viaje</button>
        </div>
    </div>
</div>

<!-- MODAL AGREGAR A VIAJE -->
<div id="agregarViajeModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white p-6 rounded-xl w-full max-w-md">
        <h3 class="font-bold text-lg mb-4">Agregar pedido a viaje</h3>
        <p class="text-sm text-gray-500 mb-3">Selecciona un viaje activo:</p>
        <div id="agregarViajeLista"></div>
        <div class="flex justify-end gap-2 mt-6">
            <button onclick="cerrarAgregarViaje()" class="bg-gray-300 px-4 py-2 rounded">Cancelar</button>
        </div>
    </div>
</div>

<script>
const API_PRODUCTS = "http://localhost:3000/api/products";
const API_ORDERS = "http://localhost:3000/api/orders";
const API_TOKENS = "http://localhost:3000/api/tokens";
const API_FINANCING = "http://localhost:3000/api/financiamiento";
const API_CONTRACTS = "http://localhost:3000/api/contracts";
const API_TRIPS = "http://localhost:3000/api/trips";
const token = localStorage.getItem("token");

// ======================
// CREAR PRODUCTO
// ======================
document.getElementById("productForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const body = {
        nombre: nombre.value,
        cantidad: cantidad.value,
        precioKg: precioKg.value,
        ubicacion: ubicacion.value
    };

    const res = await fetch(API_PRODUCTS, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(body)
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.message);
        return;
    }

    alert("Producto creado");
    loadMyProducts();
    e.target.reset();
});

// ======================
// MIS PRODUCTOS
// ======================
async function loadMyProducts() {
    const res = await fetch(API_PRODUCTS + "/me", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = data.map(p => `
        <tr class="border-b">
            <td>${p.nombre}</td>
            <td>${p.cantidad}</td>
            <td>${p.precioKg}</td>
            <td>${p.ubicacion}</td>
            <td class="flex gap-2">
                <button onclick="tokenizarProducto('${p._id}')"
                    class="text-blue-500 text-sm">
                    Tokenizar
                </button>
                <button onclick="deleteProduct('${p._id}')"
                    class="text-red-500 text-sm">
                    Eliminar
                </button>
            </td>
        </tr>
    `).join("");
}

// ======================
// ELIMINAR PRODUCTO
// ======================
async function deleteProduct(id) {
    if (!confirm("¿Eliminar producto?")) return;

    const res = await fetch(`${API_PRODUCTS}/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.message);
        return;
    }

    loadMyProducts();
}

// ======================
// PEDIDOS AGRICULTOR
// ======================
async function loadPedidosAgricultor() {
    const container = document.getElementById("orders");

    try {
        const res = await fetch(API_ORDERS + "/agricultor", {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        if (!data.length) {
            container.innerHTML = "<p class='text-gray-500'>No hay pedidos aún</p>";
            return;
        }

        const badgeEstado = (e) => ({
            pendiente: "bg-yellow-500",
            aceptado: "bg-green-600",
            rechazado: "bg-red-600",
            en_transporte: "bg-purple-600",
            entregado: "bg-blue-600"
        }[e] || "bg-gray-400");

        const labelEstado = (e) => ({
            pendiente: "Pendiente",
            aceptado: "Aceptado",
            rechazado: "Rechazado",
            en_transporte: "En transporte",
            entregado: "Entregado"
        }[e] || e);

        container.innerHTML = data.map(o => `
            <div class="border p-3 rounded mb-3">
                <div class="flex justify-between items-start">
                    <div>
                        <p><b>Producto:</b> ${o.producto?.nombre || "—"}</p>
                        <p><b>Cantidad:</b> ${o.cantidad} kg</p>
                        <p><b>Comercio:</b> ${o.comercio?.nombre || "—"}</p>
                    </div>
                    <span class="text-white px-2 py-0.5 rounded text-xs font-bold ${badgeEstado(o.estado)}">
                        ${labelEstado(o.estado)}
                    </span>
                </div>

                ${o.estado === "pendiente" ? `
                    <div class="mt-2 flex gap-2">
                        <button onclick="updateStatus('${o._id}', 'aceptado')"
                            class="bg-green-500 text-white px-3 py-1 rounded text-sm font-bold">
                            Aceptar
                        </button>
                        <button onclick="updateStatus('${o._id}', 'rechazado')"
                            class="bg-red-500 text-white px-3 py-1 rounded text-sm font-bold">
                            Rechazar
                        </button>
                    </div>
                ` : o.estado === "aceptado" ? `
                    <div class="mt-2">
                        <span class="inline-block px-3 py-1 rounded text-white font-bold bg-green-600 text-sm">Aceptado</span>
                        ${!o.viaje ? `
                            <button onclick="agregarAPedidoViaje('${o._id}')"
                                class="ml-2 bg-blue-500 text-white px-3 py-1 rounded text-sm font-bold">
                                Agregar a viaje
                            </button>
                        ` : ""}
                    </div>
                ` : ""}

                ${o.viaje ? `
                    <div class="mt-2 p-2 bg-gray-50 border rounded text-sm">
                        <p><b>Viaje:</b> ${o.viaje.codigo || "—"} — ${o.viaje.origen || "—"} → ${o.viaje.destino || "—"}</p>
                        <p><b>Transportista:</b> ${o.viaje.transportista?.nombre || "Pendiente de asignar"}</p>
                        <p><b>Estado del envío:</b>
                            <span class="text-white px-2 py-0.5 rounded text-xs font-bold
                                ${o.viaje.estado === "en_camino" ? "bg-purple-500"
                                : o.viaje.estado === "carga_recogida" ? "bg-indigo-500"
                                : o.viaje.estado === "asignado" ? "bg-blue-600"
                                : o.viaje.estado === "llegó_a_destino" ? "bg-green-500"
                                : o.viaje.estado === "entregado" ? "bg-green-700"
                                : o.viaje.estado === "cancelado" ? "bg-red-600"
                                : "bg-gray-400"}">
                                ${o.viaje.estado === "en_camino" ? "En camino"
                                : o.viaje.estado === "carga_recogida" ? "Carga recogida"
                                : o.viaje.estado === "asignado" ? "Asignado"
                                : o.viaje.estado === "llegó_a_destino" ? "Llegó a destino"
                                : o.viaje.estado === "entregado" ? "Entregado"
                                : o.viaje.estado === "cancelado" ? "Cancelado"
                                : o.viaje.estado || "—"}
                            </span>
                        </p>
                    </div>
                ` : ""}
                ${o.estado !== "pendiente" && o.estado !== "rechazado" ? `
                    <div class="mt-2">
                        <button onclick="imprimirFactura('${o._id}')"
                            class="text-blue-600 text-sm font-bold">
                            🖨️ Imprimir factura
                        </button>
                    </div>
                ` : ""}
            </div>
        `).join("");

    } catch (e) {
        container.innerHTML = "<p class='text-red-500'>Error al cargar pedidos</p>";
    }
}

// ======================
// ACTUALIZAR ESTADO
// ======================
async function updateStatus(id, estado) {
    const res = await fetch(`${API_ORDERS}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ estado })
    });
    if (!res.ok) {
        const data = await res.json();
        alert(data.message);
    }
    loadPedidosAgricultor();
}

// ======================
// TOKENIZAR PRODUCTO
// ======================
async function tokenizarProducto(productoId) {
    if (!confirm("¿Generar token para este producto?")) return;

    const res = await fetch(API_TOKENS + "/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ productoId })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.message);
        return;
    }

    alert("Token " + data.codigo + " creado correctamente");
    loadMisTokens();
}

// ======================
// MIS TOKENS
// ======================
async function loadMisTokens() {
    const container = document.getElementById("tokensContainer");

    try {
        const res = await fetch(API_TOKENS + "/mis-tokens", {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        if (!data.length) {
            container.innerHTML = "<p class='text-gray-500'>No has generado tokens aún</p>";
            return;
        }

        container.innerHTML = data.map(t => `
            <div class="border p-3 rounded mb-3">
                <div class="flex justify-between items-start">
                    <div>
                        <p><b>Código:</b> ${t.codigo}</p>
                        <p><b>Activo:</b> ${t.nombreActivo}</p>
                        <p><b>Cantidad:</b> ${t.cantidad} ${t.unidad}</p>
                        <p><b>Producto:</b> ${t.producto?.nombre || "—"}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-white px-3 py-1 rounded text-sm font-bold
                            ${t.estado === "Disponible" ? "bg-green-600"
                            : t.estado === "Vendido" ? "bg-blue-600"
                            : t.estado === "Transferido" ? "bg-yellow-500"
                            : t.estado === "Dividido" ? "bg-purple-600"
                            : "bg-red-600"}">
                            ${t.estado}
                        </span>
                        ${t.estado === "Disponible" && !t.financiado ? `
                            <button onclick="abrirFinancing('${t._id}', '${t.codigo}', ${t.cantidad}, ${t.producto?.precioKg || t.contrato?.precioAcordado || 0})"
                                class="block mt-2 text-yellow-600 text-sm w-full text-right font-bold">
                                Solicitar financiamiento
                            </button>
                        ` : t.financiado ? `
                            <span class="block mt-2 text-blue-600 text-sm w-full text-right font-bold">
                                Comprometido como garantía
                            </span>
                        ` : ""}
                    </div>
                </div>
                ${t.historial?.length ? `
                    <details class="mt-2">
                        <summary class="text-sm text-gray-500 cursor-pointer">Historial</summary>
                        ${t.historial.map(h => `
                            <p class="text-xs text-gray-400 ml-2">
                                ${h.accion} — ${new Date(h.fecha).toLocaleString()}
                            </p>
                        `).join("")}
                    </details>
                ` : ""}
            </div>
        `).join("");

    } catch (e) {
        container.innerHTML = "<p class='text-red-500'>Error al cargar tokens</p>";
    }
}

// ======================
// FINANCIAMIENTO
// ======================
let finTokenId = null;

function abrirFinancing(tokenId, codigo, cantidad, precioKg) {
    finTokenId = tokenId;
    document.getElementById("finTokenCodigo").innerText = codigo;
    document.getElementById("finMonto").value = "";
    document.getElementById("finPlazo").value = "90";

    const valor = cantidad * precioKg;
    document.getElementById("finValorEstimado").innerText = "$" + valor.toFixed(2);

    document.getElementById("financingModal").classList.remove("hidden");
}

function cerrarFinancing() {
    document.getElementById("financingModal").classList.add("hidden");
    finTokenId = null;
}

async function confirmarFinancing() {
    const monto = parseInt(document.getElementById("finMonto").value);
    const plazoDias = parseInt(document.getElementById("finPlazo").value);

    if (!monto || !plazoDias) {
        alert("Completa todos los campos");
        return;
    }

    const res = await fetch(API_FINANCING, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ tokenId: finTokenId, montoSolicitado: monto, plazoDias })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.message);
        return;
    }

    alert("Solicitud de financiamiento enviada. Espera la aprobación del administrador.");
    cerrarFinancing();
    loadMisTokens();
    loadMisFinanciamientos();
}

// ======================
// MIS FINANCIAMIENTOS
// ======================
async function loadMisFinanciamientos() {
    const container = document.getElementById("financingContainer");

    try {
        const res = await fetch(API_FINANCING, {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        if (!data.length) {
            container.innerHTML = "<p class='text-gray-500'>No has solicitado financiamientos</p>";
            return;
        }

        container.innerHTML = data.map(f => {
            const badgeColor = f.estado === "aprobado" ? "bg-green-600"
                : f.estado === "rechazado" ? "bg-red-600"
                : f.estado === "pagado" ? "bg-blue-600"
                : "bg-yellow-500";

            return `
                <div class="border p-3 rounded mb-3">
                    <div class="flex justify-between items-start">
                        <div>
                            <p><b>Token:</b> ${f.token?.codigo || "—"}</p>
                            <p><b>Producto:</b> ${f.token?.producto?.nombre || "—"}</p>
                            <p><b>Valor estimado:</b> $${f.valorEstimado}</p>
                            <p><b>Solicitado:</b> $${f.montoSolicitado}</p>
                            <p><b>Plazo:</b> ${f.plazoDias} días</p>
                            <p><b>Interés:</b> ${f.interes}%</p>
                        </div>
                        <span class="text-white px-3 py-1 rounded text-sm font-bold ${badgeColor}">
                            ${f.estado}
                        </span>
                    </div>
                    ${f.historial?.length ? `
                        <details class="mt-2">
                            <summary class="text-sm text-gray-500 cursor-pointer">Historial</summary>
                            ${f.historial.map(h => `
                                <p class="text-xs text-gray-400 ml-2">
                                    ${h.accion} — ${new Date(h.fecha).toLocaleString()}
                                </p>
                            `).join("")}
                        </details>
                    ` : ""}
                    <div class="mt-2">
                        <button onclick="imprimirComprobante('${f._id}')"
                            class="text-blue-600 text-sm font-bold">
                            🖨️ Imprimir comprobante
                        </button>
                    </div>
                </div>
            `;
        }).join("");

    } catch (e) {
        container.innerHTML = "<p class='text-red-500'>Error al cargar financiamientos</p>";
    }
}

// ======================
// CONTRATOS
// ======================
const estadoBadge = (e) => ({
    pendiente: "bg-yellow-500",
    activo: "bg-blue-600",
    en_produccion: "bg-indigo-500",
    en_transporte: "bg-purple-500",
    entregado: "bg-green-600",
    finalizado: "bg-gray-600",
    rechazado: "bg-red-600",
    cancelado: "bg-red-400"
}[e] || "bg-gray-400");

const estadoLabel = (e) => ({
    pendiente: "Pendiente",
    activo: "Activo",
    en_produccion: "En producción",
    en_transporte: "En transporte",
    entregado: "Entregado",
    finalizado: "Finalizado",
    rechazado: "Rechazado",
    cancelado: "Cancelado"
}[e] || e);

async function loadContratos() {
    const container = document.getElementById("contractsContainer");

    try {
        const res = await fetch(API_CONTRACTS + "/agricultor", {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        if (!data.length) {
            container.innerHTML = "<p class='text-gray-500'>No tienes contratos aún</p>";
            return;
        }

        container.innerHTML = data.map(c => `
            <div class="border p-3 rounded mb-3 ${c.estado === "pendiente" ? "border-yellow-300 bg-yellow-50" : ""}">
                <div class="flex justify-between items-start">
                    <div>
                        <p><b>${c.codigo}</b> — ${c.comercio?.nombre || "—"}</p>
                        <p>${c.nombreProducto} | ${c.cantidadKg} kg | $${c.precioAcordado}/kg</p>
                        <p class="text-sm text-gray-500">Entrega: ${new Date(c.fechaEntrega).toLocaleDateString()}</p>
                    </div>
                    <span class="text-white px-2 py-0.5 rounded text-xs font-bold ${estadoBadge(c.estado)}">
                        ${estadoLabel(c.estado)}
                    </span>
                </div>

                ${c.estado === "pendiente" ? `
                    <div class="mt-2 flex gap-2">
                        <button onclick="aceptarContrato('${c._id}')"
                            class="bg-green-500 text-white px-3 py-1 rounded text-sm font-bold">
                            Aceptar
                        </button>
                        <button onclick="rechazarContrato('${c._id}')"
                            class="bg-red-500 text-white px-3 py-1 rounded text-sm font-bold">
                            Rechazar
                        </button>
                    </div>
                ` : (["activo","en_produccion","en_transporte","entregado"].includes(c.estado)) ? `
                    <div class="mt-2 flex gap-2 items-center">
                        <select id="selectEstado_${c._id}" class="border rounded px-2 py-1 text-sm">
                            ${(() => {
                                const order = ["activo","en_produccion","en_transporte","entregado","finalizado"];
                                const idx = order.indexOf(c.estado);
                                return order.slice(idx + 1).map(e =>
                                    `<option value="${e}">${estadoLabel(e)}</option>`
                                ).join("");
                            })()}
                        </select>
                        <button onclick="cambiarEstadoContrato('${c._id}')"
                            class="bg-blue-500 text-white px-3 py-1 rounded text-sm font-bold">
                            Actualizar
                        </button>
                    </div>
                ` : ""}

                ${c.historial?.length ? `

function mostrarCrearViaje() {
    document.getElementById("crearViajeModal").classList.remove("hidden");

    fetch(API_ORDERS + "/agricultor", {
        headers: { "Authorization": "Bearer " + token }
    })
    .then(r => r.json())
    .then(orders => {
        const aceptadosSinViaje = orders.filter(o => o.estado === "aceptado" && !o.viaje);
        const container = document.getElementById("crearViajePedidos");

        if (!aceptadosSinViaje.length) {
            container.innerHTML = "<p class='text-gray-500'>No hay pedidos aceptados disponibles para viaje</p>";
            return;
        }

        container.innerHTML = aceptadosSinViaje.map(o => `
            <label class="flex items-center gap-2 border p-2 rounded cursor-pointer hover:bg-gray-50">
                <input type="checkbox" class="pedidoCheck" value="${o._id}" data-cantidad="${o.cantidad}" onchange="calcularCargaViaje()">
                <span>${o.producto?.nombre || "—"} — ${o.cantidad} kg — ${o.comercio?.nombre || "—"}</span>
            </label>
        `).join("");
    });
}

function calcularCargaViaje() {
    const checks = document.querySelectorAll(".pedidoCheck:checked");
    let total = 0;
    checks.forEach(c => { total += parseFloat(c.dataset.cantidad || 0); });
    document.getElementById("viajeCargaTotal").innerText = "Carga total: " + total + " kg";
}

function cerrarCrearViaje() {
    document.getElementById("crearViajeModal").classList.add("hidden");
    document.getElementById("viajeOrigen").value = "";
    document.getElementById("viajeDestino").value = "";
    document.getElementById("viajePago").value = "";
    document.getElementById("viajeCargaTotal").innerText = "";
}

async function confirmarCrearViaje() {
    const checks = document.querySelectorAll(".pedidoCheck:checked");
    const pedidos = Array.from(checks).map(c => c.value);
    const origen = document.getElementById("viajeOrigen").value.trim();
    const destino = document.getElementById("viajeDestino").value.trim();
    const pago = parseInt(document.getElementById("viajePago").value);

    if (!pedidos.length || !origen || !destino || !pago) {
        alert("Completa todos los campos y selecciona al menos un pedido");
        return;
    }

    const res = await fetch(API_TRIPS, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ pedidos, origen, destino, pago })
    });

    if (!res.ok) {
        const data = await res.json();
        alert(data.message);
        return;
    }

    alert("Viaje publicado exitosamente");
    cerrarCrearViaje();
    loadPedidosAgricultor();
    loadMisViajesAgricultor();
}

function agregarAPedidoViaje(pedidoId) {
    pedidoParaViajeId = pedidoId;
    const container = document.getElementById("agregarViajeLista");

    fetch(API_TRIPS + "/mis-pedidos", {
        headers: { "Authorization": "Bearer " + token }
    })
    .then(r => r.json())
    .then(trips => {
        const disponibles = trips.filter(t => t.estado === "pendiente" || t.estado === "asignado");

        if (!disponibles.length) {
            container.innerHTML = "<p class='text-gray-500'>No hay viajes activos para agregar. Crea uno nuevo.</p>";
            document.getElementById("agregarViajeModal").classList.remove("hidden");
            return;
        }

        container.innerHTML = disponibles.map(t => `
            <div class="border p-2 rounded mb-2 cursor-pointer hover:bg-gray-50"
                onclick="confirmarAgregarViaje('${t._id}')">
                <p><b>${t.codigo}</b> — ${t.origen} → ${t.destino} (${t.cargaTotalKg} kg)</p>
                <p class="text-sm text-gray-500">Estado: ${t.estado === "pendiente" ? "Pendiente" : "Asignado"}</p>
            </div>
        `).join("");

        document.getElementById("agregarViajeModal").classList.remove("hidden");
    });
}

function cerrarAgregarViaje() {
    document.getElementById("agregarViajeModal").classList.add("hidden");
    pedidoParaViajeId = null;
}

async function confirmarAgregarViaje(tripId) {
    // Agregar pedido a viaje existente
    const res = await fetch(API_TRIPS + "/" + tripId, {
        headers: { "Authorization": "Bearer " + token }
    });

    const trip = await res.json();
    const pedidosActuales = (trip.pedidos || []).map(p => p._id || p);
    pedidosActuales.push(pedidoParaViajeId);

    // We need an endpoint to update a trip's pedidos... Actually let me use the PUT endpoint.
    // But there's no endpoint for updating pedidos. Let me think of a simpler approach.

    // Actually, since the controller's `asignar` only goes pendiente→asignado, and `actualizarEstado`
    // only changes estado, we can't just add a pedido to a trip via existing endpoints.

    // The simplest approach: the agricultor should create a new trip with all selected pedidos,
    // or create a trip initially with all the pedidos they want.

    // Let's simplify: Instead of "Agregar a viaje" button on individual orders, we'll just have
    // the "Publicar viaje" modal where they select multiple orders and create a trip.

    alert("Para agregar más pedidos a un viaje, usa la opción 'Publicar viaje' y selecciona todos los pedidos que deseas incluir.");
    cerrarAgregarViaje();
}

                    <tr><td class="row-label">No. Orden:</td><td><b>${t.codigo}</b></td></tr>
                    <tr><td class="row-label">Fecha:</td><td>${new Date(t.createdAt || t._id?.getTimestamp?.()).toLocaleDateString() || new Date().toLocaleDateString()}</td></tr>
                    <tr><td class="row-label">Estado:</td><td><span class="badge ${estadoColor}">${t.estado}</span></td></tr>
                </table>
            </div>

            <div class="section">
                <div class="section-title">Ruta</div>
                <table>
                    <tr><td class="row-label">Origen:</td><td>${t.origen || "—"}</td></tr>
                    <tr><td class="row-label">Destino:</td><td>${t.destino || "—"}</td></tr>
                    <tr><td class="row-label">Carga total:</td><td>${t.cargaTotalKg} kg</td></tr>
                    <tr><td class="row-label">Pago:</td><td>$${t.pago}</td></tr>
                </table>
            </div>

            <div class="section">
                <div class="section-title">Participantes</div>
                <table>
                    <tr><td class="row-label">Agricultor:</td><td>${userData.nombre || "—"} (${userData.codigo || "—"})</td></tr>
                    <tr><td class="row-label">Transportista:</td><td>${t.transportista?.nombre || "Pendiente de asignar"}</td></tr>
                </table>
            </div>

            ${t.pedidos?.length ? `
            <div class="section">
                <div class="section-title">Pedidos</div>
                <table>
                    <tr><th>Producto</th><th>Cantidad</th><th>Comercio</th></tr>
                    ${t.pedidos.map(p => `
                        <tr>
                            <td>${p.producto?.nombre || "—"}</td>
                            <td>${p.cantidad} kg</td>
                            <td>${p.comercio?.nombre || "—"}</td>
                        </tr>
                    `).join("")}
                </table>
            </div>` : ""}

            ${t.tracking?.length ? `
            <div class="section">
                <div class="section-title">Tracking</div>
                <table>
                    <tr><th>Fecha</th><th>Estado</th><th>Ubicación</th></tr>
                    ${t.tracking.map(x => `
                        <tr>
                            <td>${new Date(x.fecha).toLocaleString()}</td>
                            <td>${x.estado}</td>
                            <td>${x.ubicacion || "—"}</td>
                        </tr>
                    `).join("")}
                </table>
            </div>` : ""}
        `;

        printDocument("Orden de Transporte", body);
    });
}
