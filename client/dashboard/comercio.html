<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Comercio | CosechaDirecta</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex min-h-screen">

<!-- SIDEBAR -->
<aside class="w-64 bg-green-800 text-white p-4 flex flex-col">
    <h1 class="text-xl font-bold mb-6">CosechaDirecta</h1>

    <nav class="space-y-2 flex-1">
        <button onclick="navigate('Dashboard')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">
            Dashboard
        </button>
        <button onclick="navigate('Marketplace')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">
            Marketplace
        </button>
        <button onclick="navigate('Carrito')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">
            Carrito <span id="cartBadge" class="bg-yellow-500 text-black text-xs px-2 py-0.5 rounded-full ml-1"></span>
        </button>
        <button onclick="navigate('Mis pedidos')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">
            Mis pedidos
        </button>
        <button onclick="navigate('Contratos')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">
            Contratos
        </button>
        <button onclick="navigate('Tokens')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">
            Tokens
        </button>
        <button onclick="navigate('Perfil')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">
            Perfil
        </button>
    </nav>

    <button onclick="cerrarSesion()" class="bg-red-500 w-full p-2 rounded hover:bg-red-600">
        Salir
    </button>
</aside>

<!-- CONTENIDO -->
<main class="flex-1 p-6">
    <h2 id="title" class="text-2xl font-bold mb-4">Dashboard</h2>
    <div id="content"></div>
</main>

<script>
const API_PRODUCTS = "http://localhost:3000/api/products";
const API_ORDERS = "http://localhost:3000/api/orders";
const API_CONTRACTS = "http://localhost:3000/api/contracts";
const API_TOKENS = "http://localhost:3000/api/tokens";
const API_USERS = "http://localhost:3000/api/auth";
const API_URL = "http://localhost:3000/api";
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "{}");

let allProducts = [];

// ======================
// VERIFICAR SESION
// ======================
if (!token || !user) {
    window.location.href = "../login.html";
}

// ======================
// CARRITO (localStorage)
// ======================
function getCart() {
    return JSON.parse(localStorage.getItem("cart") || "[]");
}

function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartBadge();
}

function updateCartBadge() {
    const badge = document.getElementById("cartBadge");
    const cart = getCart();
    badge.textContent = cart.length ? cart.length : "";
}

// ======================
// NAVEGACION
// ======================
function navigate(section) {
    document.getElementById("title").innerText = section;

    const fns = {
        "Dashboard": renderDashboard,
        "Marketplace": renderMarketplace,
        "Carrito": renderCarrito,
        "Mis pedidos": renderMisPedidos,
        "Contratos": renderContratos,
        "Tokens": renderTokens,
        "Perfil": renderPerfil
    };

    if (fns[section]) fns[section]();
}

// ======================
// DASHBOARD
// ======================
async function renderDashboard() {
    let totalPedidos = 0;
    let contratosActivos = 0;

    try {
        const resPedidos = await fetch(API_ORDERS + "/comercio", {
            headers: { "Authorization": "Bearer " + token }
        });
        const pedidos = await resPedidos.json();
        totalPedidos = pedidos.length;

        const resContratos = await fetch(API_CONTRACTS + "/comercio", {
            headers: { "Authorization": "Bearer " + token }
        });
        const contratos = await resContratos.json();
        contratosActivos = contratos.filter(c => c.estado === "activo").length;
    } catch (e) {}

    const content = document.getElementById("content");
    content.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-6 rounded-xl shadow">
                <p class="text-gray-500 text-sm">Pedidos realizados</p>
                <p class="text-3xl font-bold">${totalPedidos}</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow">
                <p class="text-gray-500 text-sm">Contratos activos</p>
                <p class="text-3xl font-bold">${contratosActivos}</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow">
                <p class="text-gray-500 text-sm">Bienvenido</p>
                <p class="text-xl font-bold">${user.nombre || "Usuario"}</p>
            </div>
        </div>
    `;
}

// ======================
// MARKETPLACE
// ======================
async function renderMarketplace() {
    const content = document.getElementById("content");
    content.innerHTML = `
        <input id="searchMarket" placeholder="Buscar producto..."
            class="w-full p-3 border rounded mb-4">

        <div id="marketGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    `;

    try {
        const res = await fetch(API_PRODUCTS);
        allProducts = await res.json();

        renderMarketGrid(allProducts);

        document.getElementById("searchMarket").addEventListener("input", (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p =>
                p.nombre.toLowerCase().includes(q) ||
                p.ubicacion.toLowerCase().includes(q)
            );
            renderMarketGrid(filtered);
        });

    } catch (e) {
        content.innerHTML = "<p class='text-red-500'>Error al cargar productos</p>";
    }
}

function renderMarketGrid(data) {
    const grid = document.getElementById("marketGrid");

    grid.innerHTML = data.map(p => `
        <div class="bg-white p-4 rounded-xl shadow">
            <h3 class="font-bold text-lg">${p.nombre}</h3>
            <p class="text-gray-600">${p.ubicacion}</p>
            <p class="mt-2"><b>Stock:</b> ${p.cantidad} kg</p>
            <p><b>Precio:</b> $${p.precioKg}/kg</p>
            <p class="text-sm text-gray-500">Agricultor: ${p.agricultor?.nombre || "—"}</p>

            <div class="mt-3 flex gap-2">
                <input type="number" id="qty_${p._id}" placeholder="kg" min="1" max="${p.cantidad}"
                    class="w-20 border p-1 rounded text-sm">
                <button onclick="addToCart('${p._id}', '${p.nombre}', ${p.precioKg}, '${p.agricultor?._id || ""}', '${p.agricultor?.nombre || ""}')"
                    class="bg-green-600 text-white px-3 py-1 rounded text-sm">
                    Agregar
                </button>
            </div>
        </div>
    `).join("");
}

function addToCart(id, nombre, precioKg, agricultorId, agricultorNombre) {
    const input = document.getElementById("qty_" + id);
    const cantidad = parseInt(input?.value);

    if (!cantidad || cantidad < 1) {
        alert("Indica una cantidad");
        return;
    }

    const cart = getCart();
    cart.push({ productoId: id, nombre, cantidad, precioKg, agricultorId, agricultorNombre });
    saveCart(cart);
    alert("Agregado al carrito");
}

// ======================
// CARRITO
// ======================
function renderCarrito() {
    const cart = getCart();
    const content = document.getElementById("content");

    if (!cart.length) {
        content.innerHTML = "<p class='text-gray-500'>El carrito está vacío</p>";
        return;
    }

    content.innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow">
            <h3 class="font-bold mb-4">Carrito (${cart.length} items)</h3>

            ${cart.map((item, i) => `
                <div class="border-b py-3 flex justify-between items-center">
                    <div>
                        <p class="font-bold">${item.nombre}</p>
                        <p class="text-sm text-gray-600">${item.cantidad} kg x $${item.precioKg}/kg</p>
                        <p class="text-sm text-gray-500">Agricultor: ${item.agricultorNombre || "—"}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold">$${(item.cantidad * item.precioKg).toFixed(2)}</p>
                        <button onclick="removeFromCart(${i})"
                            class="text-red-500 text-sm">Quitar</button>
                    </div>
                </div>
            `).join("")}

            <p class="text-right text-xl font-bold mt-4">
                Total: $${cart.reduce((sum, i) => sum + i.cantidad * i.precioKg, 0).toFixed(2)}
            </p>

            <button onclick="checkout()"
                class="mt-4 bg-green-600 text-white w-full p-3 rounded font-bold">
                Realizar pedidos
            </button>
        </div>
    `;
}

function removeFromCart(index) {
    const cart = getCart();
    cart.splice(index, 1);
    saveCart(cart);
    renderCarrito();
}

async function checkout() {
    const cart = getCart();

    if (!cart.length) return;

    let errors = [];

    for (const item of cart) {
        try {
            const res = await fetch(API_ORDERS, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    productoId: item.productoId,
                    cantidad: item.cantidad
                })
            });

            if (!res.ok) {
                const data = await res.json();
                errors.push(`${item.nombre}: ${data.message}`);
            }
        } catch (e) {
            errors.push(`${item.nombre}: error de conexión`);
        }
    }

    localStorage.removeItem("cart");
    updateCartBadge();

    if (errors.length) {
        alert("Algunos pedidos fallaron:\n" + errors.join("\n"));
    } else {
        alert("Todos los pedidos se realizaron correctamente");
    }

    navigate("Mis pedidos");
}

// ======================
// MIS PEDIDOS
// ======================
async function renderMisPedidos() {
    const content = document.getElementById("content");
    content.innerHTML = "<p class='text-gray-500'>Cargando pedidos...</p>";

    try {
        const res = await fetch(API_ORDERS + "/comercio", {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        if (!data.length) {
            content.innerHTML = "<p class='text-gray-500'>No has realizado pedidos aún</p>";
            return;
        }

        content.innerHTML = data.map(o => {
            const color = o.estado === "aceptado" ? "bg-green-100 border-green-300"
                : o.estado === "rechazado" ? "bg-red-100 border-red-300"
                : "bg-yellow-100 border-yellow-300";

            const badgeColor = o.estado === "aceptado" ? "bg-green-600"
                : o.estado === "rechazado" ? "bg-red-600"
                : "bg-yellow-500";

            return `
                <div class="border p-4 rounded-xl mb-3 ${color}">
                    <div class="flex justify-between items-start">
                        <div>
                            <p><b>Producto:</b> ${o.producto?.nombre || "—"}</p>
                            <p><b>Cantidad:</b> ${o.cantidad} kg</p>
                            <p><b>Agricultor:</b> ${o.agricultor?.nombre || "—"}</p>
                        </div>
                        <span class="text-white px-3 py-1 rounded text-sm font-bold ${badgeColor}">
                            ${o.estado}
                        </span>
                    </div>
                </div>
            `;
        }).join("");

    } catch (e) {
        content.innerHTML = "<p class='text-red-500'>Error al cargar pedidos</p>";
    }
}

// ======================
// CONTRATOS
// ======================
let contratoDetalleId = null;

async function renderContratos() {
    const content = document.getElementById("content");

    if (contratoDetalleId) {
        renderContratoDetalle(contratoDetalleId);
        return;
    }

    content.innerHTML = `
        <div class="flex justify-between items-center mb-4">
            <p class="text-gray-500">Cargando contratos...</p>
            <button onclick="renderNuevoContrato()"
                class="bg-blue-600 text-white px-4 py-2 rounded font-bold">
                + Nuevo contrato
            </button>
        </div>
    `;

    try {
        const res = await fetch(API_CONTRACTS + "/comercio", {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        const header = `
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg">Mis contratos (${data.length})</h3>
                <button onclick="renderNuevoContrato()"
                    class="bg-blue-600 text-white px-4 py-2 rounded font-bold">
                    + Nuevo contrato
                </button>
            </div>
        `;

        if (!data.length) {
            content.innerHTML = header + "<p class='text-gray-500'>No tienes contratos aún. Crea tu primer contrato.</p>";
            return;
        }

        const badgeColor = (estado) => ({
            pendiente: "bg-yellow-500",
            activo: "bg-blue-600",
            en_produccion: "bg-indigo-500",
            en_transporte: "bg-purple-500",
            entregado: "bg-green-600",
            finalizado: "bg-gray-600",
            rechazado: "bg-red-600",
            cancelado: "bg-red-400"
        }[estado] || "bg-gray-400");

        const badgeLabel = (estado) => ({
            pendiente: "Pendiente",
            activo: "Activo",
            en_produccion: "En producción",
            en_transporte: "En transporte",
            entregado: "Entregado",
            finalizado: "Finalizado",
            rechazado: "Rechazado",
            cancelado: "Cancelado"
        }[estado] || estado);

        content.innerHTML = header + `
            <div class="overflow-x-auto">
                <table class="w-full bg-white rounded-xl shadow">
                    <thead>
                        <tr class="border-b bg-gray-50">
                            <th class="p-3 text-left">Código</th>
                            <th class="p-3 text-left">Producto</th>
                            <th class="p-3 text-left">Agricultor</th>
                            <th class="p-3 text-left">Cantidad</th>
                            <th class="p-3 text-left">Estado</th>
                            <th class="p-3 text-left"></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(c => `
                            <tr class="border-b hover:bg-gray-50">
                                <td class="p-3 font-bold">${c.codigo}</td>
                                <td class="p-3">${c.nombreProducto}</td>
                                <td class="p-3">${c.agricultor?.nombre || "—"}</td>
                                <td class="p-3">${c.cantidadKg} kg</td>
                                <td class="p-3">
                                    <span class="text-white px-2 py-0.5 rounded text-xs font-bold ${badgeColor(c.estado)}">
                                        ${badgeLabel(c.estado)}
                                    </span>
                                </td>
                                <td class="p-3">
                                    <button onclick="verContrato('${c._id}')"
                                        class="text-blue-600 text-sm font-bold">
                                        Ver
                                    </button>
                                </td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            </div>
        `;

    } catch (e) {
        content.innerHTML = "<p class='text-red-500'>Error al cargar contratos</p>";
    }
}

function verContrato(id) {
    contratoDetalleId = id;
    renderContratoDetalle(id);
}

async function renderContratoDetalle(id) {
    const content = document.getElementById("content");
    content.innerHTML = "<p class='text-gray-500'>Cargando...</p>";

    try {
        const res = await fetch(API_CONTRACTS + "/" + id, {
            headers: { "Authorization": "Bearer " + token }
        });

        const c = await res.json();

        const badgeColor = {
            pendiente: "bg-yellow-500",
            activo: "bg-blue-600",
            en_produccion: "bg-indigo-500",
            en_transporte: "bg-purple-500",
            entregado: "bg-green-600",
            finalizado: "bg-gray-600",
            rechazado: "bg-red-600",
            cancelado: "bg-red-400"
        }[c.estado] || "bg-gray-400";

        const badgeLabel = {
            pendiente: "Pendiente",
            activo: "Activo",
            en_produccion: "En producción",
            en_transporte: "En transporte",
            entregado: "Entregado",
            finalizado: "Finalizado",
            rechazado: "Rechazado",
            cancelado: "Cancelado"
        }[c.estado] || c.estado;

        content.innerHTML = `
            <button onclick="volverContratos()" class="text-blue-600 mb-4 inline-block">&larr; Volver a contratos</button>

            <div class="bg-white p-6 rounded-xl shadow">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="text-2xl font-bold">${c.codigo}</h3>
                        <p class="text-gray-500 mt-1">${c.nombreProducto}</p>
                    </div>
                    <span class="text-white px-3 py-1 rounded text-sm font-bold ${badgeColor}">${badgeLabel}</span>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div>
                        <p class="text-gray-500 text-sm">Cantidad</p>
                        <p class="font-bold text-lg">${c.cantidadKg} kg</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">Precio acordado</p>
                        <p class="font-bold text-lg">$${c.precioAcordado}/kg</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">Agricultor</p>
                        <p class="font-bold">${c.agricultor?.nombre || "—"} (${c.agricultor?.codigo || "—"})</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">Fecha de entrega</p>
                        <p class="font-bold">${new Date(c.fechaEntrega).toLocaleDateString()}</p>
                    </div>
                </div>

                ${c.token ? `
                    <div class="mt-4 p-3 bg-blue-50 rounded-lg">
                        <p class="text-sm text-gray-500">Token asociado</p>
                        <p class="font-bold">${c.token.codigo || "—"} — ${c.token.cantidad || "—"} kg</p>
                    </div>
                ` : ""}

                ${c.historial?.length ? `
                    <details class="mt-4">
                        <summary class="text-sm text-gray-500 cursor-pointer font-bold">Historial</summary>
                        <div class="mt-2 space-y-1">
                            ${c.historial.map(h => `
                                <p class="text-xs text-gray-400">
                                    ${h.accion} — ${new Date(h.fecha).toLocaleString()} ${h.usuario?.nombre ? `(${h.usuario.nombre})` : ""}
                                </p>
                            `).join("")}
                        </div>
                    </details>
                ` : ""}

                ${c.estado !== "finalizado" && c.estado !== "cancelado" && c.estado !== "rechazado" ? `
                    <button onclick="cancelarContrato('${c._id}')"
                        class="mt-4 text-red-500 text-sm font-bold">
                        Cancelar contrato
                    </button>
                ` : ""}
            </div>
        `;
    } catch (e) {
        content.innerHTML = "<p class='text-red-500'>Error al cargar contrato</p>";
    }
}

function volverContratos() {
    contratoDetalleId = null;
    renderContratos();
}

async function cancelarContrato(id) {
    if (!confirm("¿Cancelar este contrato?")) return;

    const res = await fetch(`${API_CONTRACTS}/${id}/cancelar`, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + token }
    });

    if (!res.ok) {
        const data = await res.json();
        alert(data.message);
        return;
    }

    renderContratoDetalle(id);
}

async function renderNuevoContrato() {
    const content = document.getElementById("content");

    let agricultores = [];
    try {
        const res = await fetch(API_USERS + "/agricultores");
        agricultores = await res.json();
    } catch (e) {}

    content.innerHTML = `
        <button onclick="volverContratos()" class="text-blue-600 mb-4 inline-block">&larr; Volver a contratos</button>

        <div class="bg-white p-6 rounded-xl shadow max-w-lg">
            <h3 class="font-bold text-xl mb-6">Nuevo contrato</h3>

            <form id="formContrato" class="space-y-4">
                <div>
                    <label class="text-sm font-semibold">Nombre del producto</label>
                    <input type="text" id="fcProducto" required
                        class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="text-sm font-semibold">Agricultor</label>
                    <select id="fcAgricultor" required
                        class="w-full border p-2 rounded">
                        <option value="">Selecciona un agricultor</option>
                        ${agricultores.map(a => `
                            <option value="${a._id}">${a.codigo} — ${a.nombre}</option>
                        `).join("")}
                    </select>
                </div>
                <div>
                    <label class="text-sm font-semibold">Cantidad (kg)</label>
                    <input type="number" id="fcCantidad" min="1" required
                        class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="text-sm font-semibold">Precio acordado ($/kg)</label>
                    <input type="number" id="fcPrecio" min="0.01" step="0.01" required
                        class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="text-sm font-semibold">Fecha de entrega</label>
                    <input type="date" id="fcFecha" required
                        class="w-full border p-2 rounded">
                </div>

                <button type="submit"
                    class="bg-blue-600 text-white w-full p-3 rounded font-bold">
                    Crear contrato
                </button>
            </form>
        </div>
    `;

    document.getElementById("formContrato").addEventListener("submit", async (e) => {
        e.preventDefault();

        const body = {
            agricultorId: document.getElementById("fcAgricultor").value,
            nombreProducto: document.getElementById("fcProducto").value.trim(),
            cantidadKg: parseInt(document.getElementById("fcCantidad").value),
            precioAcordado: parseFloat(document.getElementById("fcPrecio").value),
            fechaEntrega: document.getElementById("fcFecha").value
        };

        const res = await fetch(API_CONTRACTS, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.message);
            return;
        }

        alert("Contrato " + data.codigo + " creado. Espera la respuesta del agricultor.");
        volverContratos();
    });
}

// ======================
// TOKENS
// ======================
async function renderTokens() {
    const content = document.getElementById("content");
    content.innerHTML = "<p class='text-gray-500'>Cargando tokens...</p>";

    try {
        const [resDisponibles, resMios] = await Promise.all([
            fetch(API_TOKENS),
            fetch(API_TOKENS + "/mis-tokens", {
                headers: { "Authorization": "Bearer " + token }
            })
        ]);

        const disponibles = await resDisponibles.json();
        const mios = await resMios.json();

        content.innerHTML = `
            <div class="mb-6">
                <h3 class="font-bold text-lg mb-3">Tokens disponibles (${disponibles.length})</h3>
                ${disponibles.length ? `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${disponibles.map(t => `
                            <div class="border border-green-300 bg-green-50 p-4 rounded-xl">
                                <p><b class="text-lg">${t.codigo}</b></p>
                                <p><b>Activo:</b> ${t.nombreActivo}</p>
                                <p><b>Cantidad:</b> ${t.cantidad} ${t.unidad}</p>
                                <p><b>Agricultor:</b> ${t.propietario?.nombre || "—"}</p>
                                <span class="inline-block mt-2 bg-green-600 text-white px-3 py-1 rounded text-sm font-bold">
                                    ${t.estado}
                                </span>
                            </div>
                        `).join("")}
                    </div>
                ` : "<p class='text-gray-500'>No hay tokens disponibles</p>"}
            </div>

            <div>
                <h3 class="font-bold text-lg mb-3">Mis tokens (${mios.length})</h3>
                ${mios.length ? `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${mios.map(t => `
                            <div class="border p-4 rounded-xl
                                ${t.estado === "Disponible" ? "bg-green-50 border-green-300"
                                : t.estado === "Comprado" ? "bg-blue-50 border-blue-300"
                                : "bg-gray-50 border-gray-300"}">
                                <p><b class="text-lg">${t.codigo}</b></p>
                                <p><b>Activo:</b> ${t.nombreActivo}</p>
                                <p><b>Cantidad:</b> ${t.cantidad} ${t.unidad}</p>
                                <span class="inline-block mt-2 text-white px-3 py-1 rounded text-sm font-bold
                                    ${t.estado === "Disponible" ? "bg-green-600"
                                    : t.estado === "Comprado" ? "bg-blue-600"
                                    : "bg-gray-600"}">
                                    ${t.estado}
                                </span>
                            </div>
                        `).join("")}
                    </div>
                ` : "<p class='text-gray-500'>No posees tokens</p>"}
            </div>
        `;

    } catch (e) {
        content.innerHTML = "<p class='text-red-500'>Error al cargar tokens</p>";
    }
}

function renderPerfil() {
    const content = document.getElementById("content");
    content.innerHTML = `
        <div class="bg-white p-6 rounded-xl shadow max-w-md">

            <div class="space-y-2">
                <p><b>Código:</b> ${user.codigo || "—"}</p>
                <p><b>Email:</b> ${user.email || "—"}</p>
                <p><b>Rol:</b> ${user.rol || "—"}</p>

        </div>
    `;
}

    localStorage.clear();
    window.location.href = "../login.html";
}

updateCartBadge();
navigate("Dashboard");
