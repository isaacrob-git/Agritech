<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Administrador | CosechaDirecta</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex min-h-screen">

<!-- SIDEBAR -->
<aside class="w-64 bg-green-800 text-white p-4 flex flex-col">
    <h1 class="text-xl font-bold mb-6">CosechaDirecta</h1>

    <nav class="space-y-2 flex-1">
        <button onclick="navigate('Dashboard')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">Dashboard</button>
        <button onclick="navigate('Usuarios')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">Usuarios</button>
        <button onclick="navigate('Productos')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">Productos</button>
        <button onclick="navigate('Pedidos')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">Pedidos</button>
        <button onclick="navigate('Contratos')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">Contratos</button>
        <button onclick="navigate('Tokens')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">Tokens</button>
        <button onclick="navigate('Viajes')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">Viajes</button>
        <button onclick="navigate('Financiamientos')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">Financiamientos</button>
        <button onclick="navigate('Perfil')" class="nav-btn block w-full text-left p-2 rounded hover:bg-green-700">Perfil</button>
    </nav>

    <button onclick="cerrarSesion()" class="bg-red-500 w-full p-2 rounded hover:bg-red-600">Cerrar sesión</button>
</aside>

<!-- MAIN -->
<main class="flex-1 p-6">
    <h2 id="title" class="text-2xl font-bold mb-4">Dashboard</h2>
    <div id="content"></div>
</main>

<script>
const API_ADMIN = "http://localhost:3000/api/admin";
const API_FINANCING = "http://localhost:3000/api/financiamiento";
const API_CONTRACTS = "http://localhost:3000/api/contracts";
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "{}");

if (!token || !user) window.location.href = "../login.html";

function navigate(section) {
    document.getElementById("title").innerText = section;
    const fns = {
        Dashboard: renderDashboard, Usuarios: renderUsuarios, Productos: renderProductos,
        Pedidos: renderPedidos, Contratos: renderContratos, Tokens: renderTokens,
        Viajes: renderViajes, Financiamientos: renderFinanciamientos, Perfil: renderPerfil
    };
    if (fns[section]) fns[section]();
}

// ======================
// DASHBOARD
// ======================
async function renderDashboard() {
    const c = document.getElementById("content");
    c.innerHTML = `<p class='text-gray-500'>Cargando...</p>`;

    try {
        const [usuarios, productos, pedidos, contratos, tokens, viajes, financs] = await Promise.all([
            fetch(API_ADMIN + "/usuarios", { headers: { Authorization: "Bearer " + token } }).then(r => r.json()),
            fetch(API_ADMIN + "/productos", { headers: { Authorization: "Bearer " + token } }).then(r => r.json()),
            fetch(API_ADMIN + "/pedidos", { headers: { Authorization: "Bearer " + token } }).then(r => r.json()),
            fetch(API_ADMIN + "/contratos", { headers: { Authorization: "Bearer " + token } }).then(r => r.json()),
            fetch(API_ADMIN + "/tokens", { headers: { Authorization: "Bearer " + token } }).then(r => r.json()),
            fetch(API_ADMIN + "/viajes", { headers: { Authorization: "Bearer " + token } }).then(r => r.json()),
            fetch(API_FINANCING + "/pendientes", { headers: { Authorization: "Bearer " + token } }).then(r => r.json()).catch(() => [])
        ]);

        const len = (a) => (Array.isArray(a) ? a.length : 0);

        c.innerHTML = `
            <p class="text-gray-500 mb-6">Bienvenido, ${user.nombre || "Admin"}</p>
            <div class="grid grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl shadow border-l-4 border-blue-600">
                    <p class="text-sm text-blue-600 font-bold">USUARIOS</p>
                    <p class="text-3xl font-bold">${len(usuarios)}</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow border-l-4 border-green-600">
                    <p class="text-sm text-green-600 font-bold">PRODUCTOS</p>
                    <p class="text-3xl font-bold">${len(productos)}</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow border-l-4 border-yellow-600">
                    <p class="text-sm text-yellow-600 font-bold">PEDIDOS</p>
                    <p class="text-3xl font-bold">${len(pedidos)}</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow border-l-4 border-indigo-600">
                    <p class="text-sm text-indigo-600 font-bold">CONTRATOS</p>
                    <p class="text-3xl font-bold">${len(contratos)}</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow border-l-4 border-purple-600">
                    <p class="text-sm text-purple-600 font-bold">TOKENS</p>
                    <p class="text-3xl font-bold">${len(tokens)}</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow border-l-4 border-orange-600">
                    <p class="text-sm text-orange-600 font-bold">VIAJES</p>
                    <p class="text-3xl font-bold">${len(viajes)}</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow border-l-4 border-red-600">
                    <p class="text-sm text-red-600 font-bold">FINANC. PENDIENTES</p>
                    <p class="text-3xl font-bold">${len(financs)}</p>
                </div>
            </div>
        `;
    } catch (e) {
        c.innerHTML = "<p class='text-red-500'>Error al cargar dashboard</p>";
    }
}

// ======================
// USUARIOS
// ======================
async function renderUsuarios() {
    const c = document.getElementById("content");

    try {
        const res = await fetch(API_ADMIN + "/usuarios", { headers: { Authorization: "Bearer " + token } });
        const data = await res.json();

        c.innerHTML = `
            <div class="flex justify-between items-center mb-4">
                <p class="text-gray-500">${data.length} usuarios registrados</p>
                <button onclick="abrirModalRegistro()"
                    class="bg-green-600 text-white px-4 py-2 rounded text-sm font-bold hover:bg-green-700">
                    + Registrar usuario
                </button>
            </div>
            <div class="bg-white rounded-xl shadow overflow-x-auto">
                <table class="w-full">
                    <thead><tr class="bg-gray-100 text-left">
                        <th class="p-3">Código</th><th class="p-3">Nombre</th><th class="p-3">Email</th><th class="p-3">Rol</th><th class="p-3">Registro</th><th class="p-3">Acciones</th>
                    </tr></thead>
                    <tbody>
                        ${data.map(u => `
                            <tr class="border-b hover:bg-gray-50">
                                <td class="p-3 font-bold">${u.codigo || "—"}</td>
                                <td class="p-3">${u.nombre || "—"}</td>
                                <td class="p-3">${u.email || "—"}</td>
                                <td class="p-3"><span class="text-white px-2 py-0.5 rounded text-xs font-bold ${u.rol === "admin" ? "bg-red-600" : u.rol === "agricultor" ? "bg-green-600" : u.rol === "comercio" ? "bg-blue-600" : "bg-purple-600"}">${u.rol}</span></td>
                                <td class="p-3 text-sm text-gray-500">${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : "—"}</td>
                                <td class="p-3 flex gap-1">
                                    <button onclick='abrirModalEditar("usuario","${u._id}",${JSON.stringify(u).replace(/'/g,"&#39;")})' class="text-blue-600 text-xs font-bold border border-blue-600 px-2 py-0.5 rounded">Editar</button>
                                    <button onclick='abrirModalPassword("${u._id}","${u.nombre}")' class="text-yellow-600 text-xs font-bold border border-yellow-600 px-2 py-0.5 rounded">🔑</button>
                                    <button onclick='abrirModalEliminar("usuario","${u._id}","${u.codigo || u.nombre}")' class="text-red-600 text-xs font-bold border border-red-600 px-2 py-0.5 rounded">Eliminar</button>
                                </td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            </div>
        `;
    } catch (e) {
        c.innerHTML = "<p class='text-red-500'>Error al cargar usuarios</p>";
    }
}

// ======================
// PRODUCTOS
// ======================
async function renderProductos() {
    const c = document.getElementById("content");

    try {
        const res = await fetch(API_ADMIN + "/productos", { headers: { Authorization: "Bearer " + token } });
        const data = await res.json();

        c.innerHTML = `
            <div class="bg-white rounded-xl shadow overflow-x-auto">
                <table class="w-full">
                    <thead><tr class="bg-gray-100 text-left">
                        <th class="p-3">Producto</th><th class="p-3">Agricultor</th><th class="p-3">Cantidad</th><th class="p-3">Precio/kg</th><th class="p-3">Ubicación</th><th class="p-3">Estado</th><th class="p-3">Acciones</th>
                    </tr></thead>
                    <tbody>
                        ${data.map(p => `
                            <tr class="border-b hover:bg-gray-50">
                                <td class="p-3 font-bold">${p.nombre}</td>
                                <td class="p-3">${p.agricultor?.nombre || "—"}</td>
                                <td class="p-3">${p.cantidad} kg</td>
                                <td class="p-3">$${p.precioKg}</td>
                                <td class="p-3">${p.ubicacion}</td>
                                <td class="p-3"><span class="text-white px-2 py-0.5 rounded text-xs font-bold ${p.estado === "disponible" ? "bg-green-600" : "bg-red-600"}">${p.estado}</span></td>
                                <td class="p-3 flex gap-1">
                                    <button onclick='abrirModalEditar("producto","${p._id}",${JSON.stringify(p).replace(/'/g,"&#39;")})' class="text-blue-600 text-xs font-bold border border-blue-600 px-2 py-0.5 rounded">Editar</button>
                                    <button onclick='abrirModalEliminar("producto","${p._id}","${p.nombre}")' class="text-red-600 text-xs font-bold border border-red-600 px-2 py-0.5 rounded">Eliminar</button>
                                </td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            </div>
        `;
    } catch (e) {
        c.innerHTML = "<p class='text-red-500'>Error al cargar productos</p>";
    }
}

// ======================
// PEDIDOS
// ======================
async function renderPedidos() {
    const c = document.getElementById("content");

    try {
        const res = await fetch(API_ADMIN + "/pedidos", { headers: { Authorization: "Bearer " + token } });
        const data = await res.json();

        const badge = (e) => ({
            pendiente: "bg-yellow-500", aceptado: "bg-green-600", rechazado: "bg-red-600",
            en_transporte: "bg-purple-600", entregado: "bg-blue-600"
        }[e] || "bg-gray-400");

        c.innerHTML = `
            <div class="bg-white rounded-xl shadow overflow-x-auto">
                <table class="w-full">
                    <thead><tr class="bg-gray-100 text-left">
                        <th class="p-3">ID</th><th class="p-3">Producto</th><th class="p-3">Cantidad</th><th class="p-3">Comercio</th><th class="p-3">Agricultor</th><th class="p-3">Estado</th><th class="p-3"></th><th class="p-3">Acciones</th>
                    </tr></thead>
                    <tbody>
                        ${data.map(o => `
                            <tr class="border-b hover:bg-gray-50">
                                <td class="p-3 text-xs font-mono">${o._id.slice(-6)}</td>
                                <td class="p-3 font-bold">${o.producto?.nombre || "—"}</td>
                                <td class="p-3">${o.cantidad} kg</td>
                                <td class="p-3">${o.comercio?.nombre || "—"}</td>
                                <td class="p-3">${o.agricultor?.nombre || "—"}</td>
                                <td class="p-3"><span class="text-white px-2 py-0.5 rounded text-xs font-bold ${badge(o.estado)}">${o.estado}</span></td>
                                <td class="p-3">${o.estado !== "pendiente" && o.estado !== "rechazado" ? `<button onclick="imprimirFacturaPedido('${o._id}')" class="text-blue-600 text-sm">PDF</button>` : ""}</td>
                                <td class="p-3 flex gap-1">
                                    <button onclick='abrirModalEditar("pedido","${o._id}",${JSON.stringify({ estado: o.estado }).replace(/'/g,"&#39;")})' class="text-blue-600 text-xs font-bold border border-blue-600 px-2 py-0.5 rounded">Editar</button>
                                    <button onclick='abrirModalEliminar("pedido","${o._id}","${o._id.slice(-6)}")' class="text-red-600 text-xs font-bold border border-red-600 px-2 py-0.5 rounded">Eliminar</button>
                                </td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            </div>
        `;
    } catch (e) {
        c.innerHTML = "<p class='text-red-500'>Error al cargar pedidos</p>";
    }
}

// ======================
// CONTRATOS
// ======================
let contratoDetalleId = null;

async function renderContratos() {
    const c = document.getElementById("content");
    if (contratoDetalleId) { renderContratoDetalle(contratoDetalleId); return; }

    try {
        const res = await fetch(API_ADMIN + "/contratos", { headers: { Authorization: "Bearer " + token } });
        const data = await res.json();

        const badgeC = (e) => ({
            pendiente: "bg-yellow-500", activo: "bg-blue-600", en_produccion: "bg-indigo-500",
            en_transporte: "bg-purple-500", entregado: "bg-green-600", finalizado: "bg-gray-600",
            rechazado: "bg-red-600", cancelado: "bg-red-400"
        }[e] || "bg-gray-400");

        c.innerHTML = `
            <div class="bg-white rounded-xl shadow overflow-x-auto">
                <table class="w-full">
                    <thead><tr class="bg-gray-100 text-left">
                        <th class="p-3">Código</th><th class="p-3">Producto</th><th class="p-3">Comercio</th><th class="p-3">Agricultor</th><th class="p-3">Cantidad</th><th class="p-3">Estado</th><th class="p-3"></th><th class="p-3">Acciones</th>
                    </tr></thead>
                    <tbody>
                        ${data.map(c => `
                            <tr class="border-b hover:bg-gray-50">
                                <td class="p-3 font-bold">${c.codigo}</td>
                                <td class="p-3">${c.nombreProducto}</td>
                                <td class="p-3">${c.comercio?.nombre || "—"}</td>
                                <td class="p-3">${c.agricultor?.nombre || "—"}</td>
                                <td class="p-3">${c.cantidadKg} kg</td>
                                <td class="p-3"><span class="text-white px-2 py-0.5 rounded text-xs font-bold ${badgeC(c.estado)}">${c.estado}</span></td>
                                <td class="p-3 flex gap-1">
                                    <button onclick="contratoDetalleId='${c._id}'; renderContratos();" class="text-blue-600 text-sm">Ver</button>
                                    <button onclick="imprimirContratoAdmin('${c._id}')" class="text-blue-600 text-sm">PDF</button>
                                </td>
                                <td class="p-3 flex gap-1">
                                    <button onclick='abrirModalEditar("contrato","${c._id}",${JSON.stringify({ estado: c.estado, precioAcordado: c.precioAcordado }).replace(/'/g,"&#39;")})' class="text-blue-600 text-xs font-bold border border-blue-600 px-2 py-0.5 rounded">Editar</button>
                                    <button onclick='abrirModalEliminar("contrato","${c._id}","${c.codigo}")' class="text-red-600 text-xs font-bold border border-red-600 px-2 py-0.5 rounded">Eliminar</button>
                                </td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            </div>
        `;
    } catch (e) {
        c.innerHTML = "<p class='text-red-500'>Error al cargar contratos</p>";
    }
}

async function renderContratoDetalle(id) {
    const c = document.getElementById("content");

    try {
        const res = await fetch(API_CONTRACTS + "/" + id, { headers: { Authorization: "Bearer " + token } });
        const ct = await res.json();

        const badgeC = (e) => ({
            pendiente: "bg-yellow-500", activo: "bg-blue-600", en_produccion: "bg-indigo-500",
            en_transporte: "bg-purple-500", entregado: "bg-green-600", finalizado: "bg-gray-600",
            rechazado: "bg-red-600", cancelado: "bg-red-400"
        }[e] || "bg-gray-400");

        c.innerHTML = `
            <button onclick="contratoDetalleId=null; renderContratos();" class="text-blue-600 mb-4 block">&larr; Volver</button>
            <div class="bg-white p-6 rounded-xl shadow max-w-2xl">
                <div class="flex justify-between items-start">
                    <div><h3 class="text-2xl font-bold">${ct.codigo}</h3><p class="text-gray-500">${ct.nombreProducto}</p></div>
                    <span class="text-white px-3 py-1 rounded text-sm font-bold ${badgeC(ct.estado)}">${ct.estado}</span>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div><p class="text-sm text-gray-500">Comercio</p><p class="font-bold">${ct.comercio?.nombre || "—"}</p></div>
                    <div><p class="text-sm text-gray-500">Agricultor</p><p class="font-bold">${ct.agricultor?.nombre || "—"}</p></div>
                    <div><p class="text-sm text-gray-500">Cantidad</p><p class="font-bold">${ct.cantidadKg} kg</p></div>
                    <div><p class="text-sm text-gray-500">Precio</p><p class="font-bold">$${ct.precioAcordado}/kg</p></div>
                    <div><p class="text-sm text-gray-500">Total</p><p class="font-bold text-green-700">$${(ct.cantidadKg * ct.precioAcordado).toFixed(2)}</p></div>
                    <div><p class="text-sm text-gray-500">Entrega</p><p class="font-bold">${new Date(ct.fechaEntrega).toLocaleDateString()}</p></div>
                </div>
                ${ct.token ? `<div class="mt-4 p-3 bg-blue-50 rounded"><p class="text-sm">Token: ${ct.token.codigo} — ${ct.token.cantidad} kg</p></div>` : ""}
                ${ct.historial?.length ? `
                    <details class="mt-4"><summary class="text-sm text-gray-500 cursor-pointer font-bold">Historial</summary>
                        <div class="mt-2 space-y-1">${ct.historial.map(h => `<p class="text-xs text-gray-400">${h.accion} — ${new Date(h.fecha).toLocaleString()}</p>`).join("")}</div>
                    </details>` : ""}
                <div class="mt-4 flex gap-2">
                    <button onclick="imprimirContratoAdmin('${ct._id}')" class="bg-blue-600 text-white px-4 py-2 rounded font-bold">🖨️ PDF</button>
                    ${ct.estado !== "finalizado" && ct.estado !== "cancelado" && ct.estado !== "rechazado" ? `<button onclick="adminCancelarContrato('${ct._id}')" class="bg-red-600 text-white px-4 py-2 rounded font-bold">Cancelar contrato</button>` : ""}
                </div>
            </div>
        `;
    } catch (e) {
        c.innerHTML = "<p class='text-red-500'>Error al cargar contrato</p>";
    }
}

async function adminCancelarContrato(id) {
    if (!confirm("¿Cancelar este contrato? Esta acción no se puede deshacer.")) return;
    const res = await fetch(`${API_CONTRACTS}/${id}/cancelar`, {
        method: "PUT", headers: { Authorization: "Bearer " + token }
    });
    if (!res.ok) { const d = await res.json(); alert(d.message); return; }
    alert("Contrato cancelado");
    renderContratoDetalle(id);
}

// ======================
// TOKENS
// ======================
async function renderTokens() {
    const c = document.getElementById("content");

    try {
        const res = await fetch(API_ADMIN + "/tokens", { headers: { Authorization: "Bearer " + token } });
        const data = await res.json();

        const badgeT = (e) => ({
            Disponible: "bg-green-600", Vendido: "bg-blue-600", Transferido: "bg-yellow-500",
            Dividido: "bg-purple-600", Cancelado: "bg-red-600"
        }[e] || "bg-gray-400");

        c.innerHTML = `
            <div class="bg-white rounded-xl shadow overflow-x-auto">
                <table class="w-full">
                    <thead><tr class="bg-gray-100 text-left">
                        <th class="p-3">Código</th><th class="p-3">Activo</th><th class="p-3">Cantidad</th><th class="p-3">Propietario</th><th class="p-3">Estado</th><th class="p-3">Financiado</th><th class="p-3">Origen</th><th class="p-3">Acciones</th>
                    </tr></thead>
                    <tbody>
                        ${data.map(t => `
                            <tr class="border-b hover:bg-gray-50">
                                <td class="p-3 font-bold">${t.codigo}</td>
                                <td class="p-3">${t.nombreActivo}</td>
                                <td class="p-3">${t.cantidad} kg</td>
                                <td class="p-3">${t.propietario?.nombre || "—"}</td>
                                <td class="p-3"><span class="text-white px-2 py-0.5 rounded text-xs font-bold ${badgeT(t.estado)}">${t.estado}</span></td>
                                <td class="p-3">${t.financiado ? "✅ Sí" : "—"}</td>
                                <td class="p-3 text-sm">${t.producto ? "Producto" : t.contrato ? "Contrato" : "—"}</td>
                                <td class="p-3 flex gap-1">
                                    <button onclick='abrirModalEditar("token","${t._id}",${JSON.stringify({ estado: t.estado, nombreActivo: t.nombreActivo, financiado: t.financiado }).replace(/'/g,"&#39;")})' class="text-blue-600 text-xs font-bold border border-blue-600 px-2 py-0.5 rounded">Editar</button>
                                    <button onclick='abrirModalEliminar("token","${t._id}","${t.codigo}")' class="text-red-600 text-xs font-bold border border-red-600 px-2 py-0.5 rounded">Eliminar</button>
                                </td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            </div>
        `;
    } catch (e) {
        c.innerHTML = "<p class='text-red-500'>Error al cargar tokens</p>";
    }
}

// ======================
// VIAJES
// ======================
async function renderViajes() {
    const c = document.getElementById("content");

    try {
        const res = await fetch(API_ADMIN + "/viajes", { headers: { Authorization: "Bearer " + token } });
        const data = await res.json();

        const badgeV = (e) => ({
            pendiente: "bg-yellow-500", asignado: "bg-blue-600", carga_recogida: "bg-indigo-500",
            en_camino: "bg-purple-500", "llegó_a_destino": "bg-green-500", entregado: "bg-green-700", cancelado: "bg-red-600"
        }[e] || "bg-gray-400");

        c.innerHTML = `
            <div class="bg-white rounded-xl shadow overflow-x-auto">
                <table class="w-full">
                    <thead><tr class="bg-gray-100 text-left">
                        <th class="p-3">Código</th><th class="p-3">Ruta</th><th class="p-3">Carga</th><th class="p-3">Pago</th><th class="p-3">Transportista</th><th class="p-3">Agricultor</th><th class="p-3">Estado</th><th class="p-3"></th><th class="p-3">Acciones</th>
                    </tr></thead>
                    <tbody>
                        ${data.map(t => `

let editando = { tipo: null, id: null };

function abrirModalEditar(tipo, id, data) {
    editando = { tipo, id };
    const m = document.getElementById("editModal");
    document.getElementById("editTitulo").innerText = `Editar ${tipo.charAt(0).toUpperCase() + tipo.slice(1)}`;
    const body = document.getElementById("editBody");
    let html = "";

    const makeField = (label, name, value, type = "text", isSelect = false, opts = null) => {
        if (isSelect) {
            return `<div class="mb-3"><label class="text-sm font-semibold block">${label}</label>
                <select id="ef_${name}" class="w-full border p-2 rounded">${opts.map(o => `<option value="${o}" ${value === o ? "selected" : ""}>${o}</option>`).join("")}</select></div>`;
        }
        return `<div class="mb-3"><label class="text-sm font-semibold block">${label}</label>
            <input type="${type}" id="ef_${name}" value="${value ?? ""}" class="w-full border p-2 rounded"></div>`;
    };

    switch (tipo) {
        case "usuario":
            html += makeField("Nombre", "nombre", data.nombre);
            html += makeField("Email", "email", data.email, "email");
            html += makeField("Rol", "rol", data.rol, "text", true, ["agricultor", "comercio", "transportista", "admin"]);
            break;
        case "producto":
            html += makeField("Nombre", "nombre", data.nombre);
            html += makeField("Precio/kg", "precioKg", data.precioKg, "number");
            html += makeField("Estado", "estado", data.estado, "text", true, ["disponible", "vendido"]);
            break;
        case "pedido":
            html += makeField("Estado", "estado", data.estado, "text", true, ["pendiente", "aceptado", "rechazado", "en_transporte", "entregado"]);
            break;
        case "contrato":
            html += makeField("Estado", "estado", data.estado, "text", true, ["pendiente", "activo", "en_produccion", "en_transporte", "entregado", "finalizado", "rechazado", "cancelado"]);
            html += makeField("Precio acordado", "precioAcordado", data.precioAcordado, "number");
            break;
        case "token":
            html += makeField("Estado", "estado", data.estado, "text", true, ["Disponible", "Vendido", "Transferido", "Dividido", "Cancelado"]);
            html += makeField("Nombre activo", "nombreActivo", data.nombreActivo);
            html += `<div class="mb-3 flex items-center gap-2"><label class="text-sm font-semibold">Financiado</label>
                <input type="checkbox" id="ef_financiado" ${data.financiado ? "checked" : ""}></div>`;
            break;
        case "viaje":
            html += makeField("Estado", "estado", data.estado, "text", true, ["pendiente", "asignado", "carga_recogida", "en_camino", "llegó_a_destino", "entregado", "cancelado"]);
            html += makeField("Pago ($)", "pago", data.pago, "number");
            break;
        case "financiamiento":
            html += makeField("Estado", "estado", data.estado, "text", true, ["pendiente", "aprobado", "rechazado", "pagado"]);
            html += makeField("Monto solicitado", "montoSolicitado", data.montoSolicitado, "number");
            html += makeField("Plazo (días)", "plazoDias", data.plazoDias, "number");
            break;
    }
    body.innerHTML = html;
    m.classList.remove("hidden");
}

function cerrarModalEditar() {
    document.getElementById("editModal").classList.add("hidden");
    editando = { tipo: null, id: null };
}

async function confirmarEditar() {
    const { tipo, id } = editando;
    if (!tipo || !id) return;

    const body = {};
    const fields = document.querySelectorAll("#editBody [id^='ef_']");
    fields.forEach(el => {
        const name = el.id.replace("ef_", "");
        if (el.type === "checkbox") {
            body[name] = el.checked;
        } else if (el.type === "number") {
            body[name] = parseFloat(el.value);
        } else {
            body[name] = el.value;
        }
    });

    const res = await fetch(`${API_ADMIN}/${tipo}s/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) { alert(data.message); return; }
    alert("Actualizado correctamente");
    cerrarModalEditar();
    navigate(document.getElementById("title").innerText);
}

let eliminando = { tipo: null, id: null };

function abrirModalEliminar(tipo, id, nombre) {
    eliminando = { tipo, id };
    const m = document.getElementById("deleteModal");
    document.getElementById("deleteMsg").innerHTML = `¿Eliminar <b>${nombre}</b>?`;
    document.getElementById("deleteWarning").classList.add("hidden");
    document.getElementById("deleteCheck").checked = false;
    document.getElementById("deleteBtn").disabled = true;
    m.classList.remove("hidden");
}

function cerrarModalEliminar() {
    document.getElementById("deleteModal").classList.add("hidden");
    eliminando = { tipo: null, id: null };
}

function toggleDeleteBtn() {
    document.getElementById("deleteBtn").disabled = !document.getElementById("deleteCheck").checked;
}

async function confirmarEliminar() {
    const { tipo, id } = eliminando;
    if (!tipo || !id) return;

    const res = await fetch(`${API_ADMIN}/${tipo}s/${id}`, {
        method: "DELETE",
        headers: { Authorization: "Bearer " + token }
    });
    const data = await res.json();
    if (!res.ok) {
        alert(data.message);
        if (data.pedidosActivos || data.tokensActivos) {
            document.getElementById("deleteWarning").innerHTML = `<p class="text-red-600 text-sm">⚠️ Tiene ${data.pedidosActivos || 0} pedido(s) activo(s) y ${data.tokensActivos || 0} token(s) activo(s). No se puede eliminar.</p>`;
            document.getElementById("deleteWarning").classList.remove("hidden");
        }
        return;
    }

    let msg = data.message;
    if (data.dependencias) {
        const dep = data.dependencias;
        const partes = [];
        if (dep.productos) partes.push(`${dep.productos} producto(s)`);
        if (dep.pedidos) partes.push(`${dep.pedidos} pedido(s)`);
        if (dep.contratos) partes.push(`${dep.contratos} contrato(s)`);
        if (dep.tokens) partes.push(`${dep.tokens} token(s)`);
        if (partes.length) msg += ` — Dependencias activas: ${partes.join(", ")}`;
    }
    alert(msg);
    cerrarModalEliminar();
    navigate(document.getElementById("title").innerText);
}

// REGISTRAR USUARIO (ADMIN)

function abrirModalRegistro() {
    document.getElementById("registroModal").classList.remove("hidden");
    document.getElementById("regNombre").value = "";
    document.getElementById("regEmail").value = "";
    document.getElementById("regPassword").value = "";
    document.getElementById("regRol").value = "agricultor";
}

function cerrarModalRegistro() {
    document.getElementById("registroModal").classList.add("hidden");
}

async function confirmarRegistro() {
    const nombre = document.getElementById("regNombre").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    const rol = document.getElementById("regRol").value;

    if (!nombre || !email || !password) {
        alert("Completa todos los campos");
        return;
    }

    const res = await fetch("http://localhost:3000/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre, email, password, rol })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.message);
        return;
    }

    alert("Usuario " + data.user.codigo + " (" + rol + ") creado exitosamente");
    cerrarModalRegistro();
    renderUsuarios();
}
